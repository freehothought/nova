<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>Nova · Verify</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{--bg:#17212b;--fg:#fff;--hint:#8a98a5;--card:#1e2a36;--accent:#3390ec;--ok:#4dcb6d;--line:#2a3744}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:480px;margin:0 auto;padding:20px 16px 40px;min-height:100vh}
  h1{font-size:21px;margin:6px 0 2px;text-align:center}
  .sub{color:var(--hint);font-size:13px;text-align:center;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:12px 0}
  .label{font-size:14px;font-weight:600;margin-bottom:10px}
  .check{display:flex;gap:10px;align-items:flex-start;cursor:pointer;font-size:14px;line-height:1.4}
  .check input{margin-top:2px;width:18px;height:18px;accent-color:var(--accent);flex:0 0 auto}
  .emojis{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:6px}
  .emoji{font-size:30px;background:#26333f;border:2px solid transparent;border-radius:12px;
    width:54px;height:54px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
  .emoji.sel{border-color:var(--accent);background:#21405e}
  .emoji.bad{border-color:#e25555;animation:shake .3s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .chip{padding:9px 13px;border-radius:20px;background:#26333f;border:1px solid var(--line);font-size:13px;cursor:pointer;transition:.12s}
  .chip.sel{background:var(--accent);border-color:var(--accent);color:#fff}
  input[type=text],select{width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--line);background:#26333f;color:var(--fg);font-size:14px;margin-top:4px}
  select{appearance:none;-webkit-appearance:none}
  input[type=text]::placeholder{color:var(--hint)}
  .btn{width:100%;padding:14px;border:0;border-radius:12px;background:var(--accent);color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:18px;transition:.15s}
  .btn:disabled{background:#33414e;color:#73818e;cursor:not-allowed}
  .skip{display:block;text-align:center;color:var(--hint);font-size:13px;margin-top:12px;cursor:pointer;text-decoration:underline}
  .hidden{display:none}
  .progress{height:5px;background:#26333f;border-radius:5px;margin:10px 0 16px;overflow:hidden}
  .pbar{height:100%;background:var(--accent);width:33%;transition:width .3s}
  .slide{animation:slidein .28s ease}
  @keyframes slidein{from{transform:translateX(46px);opacity:0}to{transform:translateX(0);opacity:1}}
  .ok-screen{text-align:center;padding-top:60px}
  .ok-screen .big{font-size:64px}
  html[dir=rtl] .check{flex-direction:row}
</style>
</head>
<body>
<div class="wrap">
  <div id="step1">
    <h1 id="t_title"></h1>
    <div class="sub" id="t_sub"></div>
    <div class="card"><label class="check"><input type="checkbox" id="age"><span id="t_age"></span></label></div>
    <div class="card"><label class="check"><input type="checkbox" id="rules"><span id="t_rules"></span></label></div>
    <div class="card"><label class="check"><input type="checkbox" id="inact"><span id="t_inact"></span></label></div>
    <div class="card">
      <div class="label"><span id="t_cap"></span> <b id="cap_target">🍎</b></div>
      <div class="emojis" id="emojis"></div>
    </div>
    <button class="btn" id="next" disabled></button>
  </div>

  <div id="step2" class="hidden">
    <h1 id="t_o_title"></h1>
    <div class="sub" id="t_o_sub"></div>
    <div class="progress"><div class="pbar" id="pbar"></div></div>

    <div class="slide" id="q_acc">
      <div class="card"><div class="label" id="t_acc"></div><div class="grid" id="g_acc"></div></div>
    </div>
    <div class="slide hidden" id="q_age">
      <div class="card" id="card_age1"><div class="label" id="t_age1"></div><input type="text" id="age1" inputmode="numeric" maxlength="2"></div>
      <div class="card hidden" id="card_age2"><div class="label" id="t_age2"></div><input type="text" id="age2" inputmode="numeric" maxlength="2"></div>
      <button class="btn" id="ageNext"></button>
    </div>
    <div class="slide hidden" id="q_city">
      <div class="card"><div class="label" id="t_country">🌍</div><select id="country"></select></div>
      <div class="card"><div class="label" id="t_city"></div><select id="city"></select></div>
      <button class="btn" id="submit"></button>
    </div>
    <span class="skip" id="skip"></span>
  </div>

  <div id="done" class="ok-screen hidden">
    <div class="big">✅</div>
    <h1 id="t_done"></h1>
    <div class="sub" id="t_done_sub"></div>
    <div class="card" id="done_cta" style="margin-top:18px;text-align:start;line-height:1.5"></div>
    <button class="btn" id="closeBtn"></button>
  </div>
</div>

const RTL = ["ar","fa","he"];
let LANG = (tg?.initDataUnsafe?.user?.language_code || navigator.language || "en").slice(0,2).toLowerCase();
if(!I18N[LANG]) LANG = "en";
const T = I18N[LANG];
const X = EXTRA[LANG] || EXTRA.en;
if(RTL.includes(LANG)){ document.documentElement.setAttribute("dir","rtl"); }
document.documentElement.setAttribute("lang",LANG);

const set=(id,txt)=>{const e=document.getElementById(id); if(e) e.textContent=txt;};
set("t_title",T.title); set("t_sub",T.sub); set("t_age",T.age); set("t_rules",T.rules); set("t_inact",X.inact);
set("t_cap",T.cap); set("next",T.next);
set("t_o_title",T.o_title); set("t_o_sub",T.o_sub);
set("t_acc",X.acc); set("t_age1",X.age); set("t_age2",X.p2); set("t_city",T.city);
set("submit",T.submit); set("skip",T.skip); set("t_done",T.done); set("t_done_sub",T.done_sub);
set("done_cta",X.cta); set("closeBtn",T.next); set("ageNext",T.next);
document.getElementById("age1").placeholder = X.ageph;
document.getElementById("age2").placeholder = X.ageph;

// Country + city pickers from Nova's own data (cities.json). Sent as country code +
// city name; the bot resolves (country_code, name) -> Nova cities.id.
const COUNTRY_LABELS={tr:"🇹🇷 Türkiye",en:"🇺🇸 USA / UK",de:"🇩🇪 Deutschland",az:"🇦🇿 Azərbaycan",ru:"🇷🇺 Russia",ua:"🇺🇦 Ukraine",fr:"🇫🇷 France",es:"🇪🇸 España",it:"🇮🇹 Italia",pt:"🇵🇹 Portugal",nl:"🇳🇱 Nederland",pl:"🇵🇱 Polska",el:"🇬🇷 Greece",bg:"🇧🇬 Bulgaria",ro:"🇷🇴 România",ca:"🇪🇸 Català",cs:"🇨🇿 Czechia",sr:"🇷🇸 Serbia",da:"🇩🇰 Danmark",ar:"🇦🇪 Arab World",fa:"🇮🇷 Iran",he:"🇮🇱 Israel",hr:"🇭🇷 Hrvatska",id:"🇮🇩 Indonesia",ja:"🇯🇵 Japan",zh:"🇨🇳 China"};
const LANG2COUNTRY={uk:"ua"}; // Telegram lang code -> Nova country code mismatch
let CITYDATA={};
const countrySel=document.getElementById("country"), citySel=document.getElementById("city");
function fillCities(cc){
  citySel.innerHTML="";
  const def=document.createElement("option"); def.value=""; def.textContent=T.city; citySel.appendChild(def);
  (CITYDATA[cc]||[]).forEach(name=>{ const o=document.createElement("option"); o.value=name; o.textContent=name; citySel.appendChild(o); });
}
function initCountries(){
  const codes=Object.keys(CITYDATA);
  const ordered=Object.keys(COUNTRY_LABELS).filter(c=>codes.includes(c)).concat(codes.filter(c=>!(c in COUNTRY_LABELS)));
  countrySel.innerHTML="";
  ordered.forEach(cc=>{ const o=document.createElement("option"); o.value=cc; o.textContent=COUNTRY_LABELS[cc]||cc.toUpperCase(); countrySel.appendChild(o); });
  let def=LANG2COUNTRY[LANG]||LANG;
  if(!CITYDATA[def]) def = CITYDATA["tr"]?"tr":(ordered[0]||"");
  countrySel.value=def; fillCities(def);
}
countrySel.onchange=()=>fillCities(countrySel.value);
fetch("cities.json").then(r=>r.json()).then(d=>{ CITYDATA=d; initCountries(); }).catch(()=>{});

// captcha
const POOL=["🍎","⭐","🚗","🐶","🌸","⚽","🔑","🎈","🍕","🌙"];
let target;
function buildCaptcha(){
  const sh=[...POOL].sort(()=>Math.random()-0.5).slice(0,5);
  target=sh[Math.floor(Math.random()*sh.length)];
  document.getElementById("cap_target").textContent=target;
  const box=document.getElementById("emojis"); box.innerHTML="";
  sh.forEach(em=>{
    const d=document.createElement("div"); d.className="emoji"; d.textContent=em;
    d.onclick=()=>{
      if(em===target){ document.querySelectorAll(".emoji").forEach(x=>x.classList.remove("sel","bad")); d.classList.add("sel"); window._cap=true; refresh(); }
      else{ d.classList.add("bad"); window._cap=false; setTimeout(()=>d.classList.remove("bad"),300); setTimeout(buildCaptcha,350); refresh(); }
    };
    box.appendChild(d);
  });
}
buildCaptcha();

const age=document.getElementById("age"), rules=document.getElementById("rules"), inact=document.getElementById("inact"), next=document.getElementById("next");
function refresh(){ next.disabled = !(age.checked && rules.checked && inact.checked && window._cap===true); }
age.onchange=refresh; rules.onchange=refresh; inact.onchange=refresh;
// Onboarding as a one-question-at-a-time swipe deck.
const SLIDES=["q_acc","q_age","q_city"];
function showSlide(name){
  SLIDES.forEach(s=>{ document.getElementById(s).classList.toggle("hidden", s!==name); });
  const idx=SLIDES.indexOf(name);
  document.getElementById("pbar").style.width=((idx+1)/SLIDES.length*100)+"%";
}
const KNOWN=new URLSearchParams(location.search).get("known")==="1";
next.onclick=()=>{
  document.getElementById("step1").classList.add("hidden");
  if(KNOWN){ finish(true); return; }  // returning/known member -> skip questions
  document.getElementById("step2").classList.remove("hidden"); buildChips(); showSlide("q_acc");
};

// Account usage = Nova role_code (woman/man/couple). Couple => two age fields.
const ROLE_CODES=["woman","man","couple"];
let roleSel=null;
function buildChips(){
  const c=document.getElementById("g_acc"); c.innerHTML="";
  T.genders.slice(0,3).forEach((it,i)=>{
    const d=document.createElement("div"); d.className="chip"; d.textContent=it;
    d.onclick=()=>{
      [...c.children].forEach(x=>x.classList.remove("sel")); d.classList.add("sel"); roleSel=i;
      const couple=(i===2);
      document.getElementById("card_age2").classList.toggle("hidden", !couple);
      set("t_age1", couple ? X.p1 : X.age);
      setTimeout(()=>showSlide("q_age"), 220);
    };
    c.appendChild(d);
  });
}
document.getElementById("ageNext").onclick=()=>showSlide("q_city");
function ageVal(id){ const v=parseInt((document.getElementById(id).value||"").trim(),10); return (v>=18 && v<=99)? v : null; }

function finish(skip){
  const Q=new URLSearchParams(location.search);
  const g=Q.get("g");
  const couple=(roleSel===2);
  const payload={ v:1, ok:true, age_ok:true, rules_ok:true, captcha:true, inactivity_ok:true, lang:LANG,
    g: g?parseInt(g,10):null,
    role: (skip||roleSel===null)?null:ROLE_CODES[roleSel],
    age: skip?null:ageVal("age1"),
    age2: (skip||!couple)?null:ageVal("age2"),
    country: skip?null:(document.getElementById("country").value||null),
    city: skip?null:(document.getElementById("city").value.trim()||null), ts:Date.now() };
  document.getElementById("step2").classList.add("hidden");
  document.getElementById("done").classList.remove("hidden");
  try{ tg.sendData(JSON.stringify(payload)); }catch(e){}
}
document.getElementById("submit").onclick=()=>finish(false);
document.getElementById("skip").onclick=()=>finish(true);
document.getElementById("closeBtn").onclick=()=>{ try{ tg.close(); }catch(e){} };
</script>
</body>
</html>
